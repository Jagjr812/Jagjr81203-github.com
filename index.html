<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Colonial Spanish Restaurant</title>

    <!-- External CSS -->
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <!-- Navigation Bar -->
    <nav class="navbar">
        <div class="logo">Colonial</div>

        <ul class="nav-menu">
            <li><a href="#home">Home</a></li>
            <li><a href="#about">About</a></li>

            <li class="dropdown">
                <a href="#menu">Menu ▾</a>
                <ul class="dropdown-menu">
                    <li><a href="#tapas">Tapas</a></li>
                    <li><a href="#entrees">Entrées</a></li>
                    <li><a href="#desserts">Desserts</a></li>
                </ul>
            </li>

            <li><a href="#order">Order Online</a></li>
            <li><a href="#cart">Cart</a></li>
            <li><a href="#contact">Contact</a></li>
        </ul>
    </nav>

    <!-- Home Section -->
    <section id="home">
        <h1>Welcome to Colonial</h1>
        <p>Experience authentic Spanish cuisine with modern online ordering.</p>

        <!-- Image Slider -->
        <div class="slider">

            <div class="slides">
                <img class="slide" src="images/img1.jpg" alt="Food 1">
                <img class="slide" src="images/img2.jpg" alt="Food 2">
                <img class="slide" src="images/img3.jpg" alt="Food 3">
                <img class="slide" src="images/img4.jpg" alt="Food 4">
            </div>

            <!-- Controls -->
            <button class="prev" onclick="changeSlide(-1)">❮</button>
            <button class="next" onclick="changeSlide(1)">❯</button>

        </div>
    </section>

    <!-- JavaScript -->
    <script src="script.js"></script>

</body>
</html>
